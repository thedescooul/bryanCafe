<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Bryan's Café</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <nav class="navbar">
    <a href="index.html" class="logo">☕ Bryan's Café</a>
    <ul class="nav-links">
      <li><a href="index.html">About</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>
</header>

<main>

  <section class="hero">
    <h1>Contact Bryan's Café</h1>
    <p>Send us a message or visit one of our branches.</p>
  </section>

  <section class="menu-section">

    <h2>Enquiry Form</h2>

    <form id="enquiryForm">
      <label for="firstName">First Name</label>
      <input type="text" id="firstName" name="firstName" required>

      <label for="lastName">Last Name</label>
      <input type="text" id="lastName" name="lastName" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required>

      <label for="subject">Message Subject</label>
      <input type="text" id="subject" name="subject" required>

      <label for="message">Message Body</label>
      <textarea id="message" name="message" required></textarea>

      <button type="submit">Submit</button>
    </form>

    <h2>Branches</h2>
    <div id="branches-container" class="branches-container"></div>

  </section>

</main>

<footer>
  <p>© <span id="currentYear"></span> Bryan's Café | 
    <a href="privacy.html" target="_blank">Privacy Policy</a>
  </p>
</footer>

<script src="js/main.js"></script>
<script src="js/contact.js"></script>

</body>
</html>
